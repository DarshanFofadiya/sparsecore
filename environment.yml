# SparseLab development environment
#
# This is the canonical environment spec for SparseLab. It is the only
# supported way to set up a development environment.
#
# To (re)create:
#     conda env remove -n sparselab -y       # if it already exists
#     conda env create -f environment.yml
#     conda activate sparselab
#
# Pre-requisites NOT managed by this file:
#
#   On macOS, OpenMP parallel kernels require libomp from Homebrew:
#       brew install libomp
#   If libomp is missing, setup.py falls back to a sequential build
#   (correct but ~5x slower on MLPs). The build emits a warning you
#   will not want to see.
#
#   On Linux, OpenMP ships with gcc/clang and no extra install is needed.
#
# Design choices:
#
#   - Python 3.11: PyTorch's most stable Apple Silicon target as of 2025.
#   - PyTorch via pip, not conda: the official pytorch.org wheels on PyPI are
#     the canonical Apple Silicon builds. conda-forge's torch is less
#     maintained for MPS/NEON.
#   - `torch>=2.8`: minimum version that ships the Stable libtorch ABI,
#     which keeps our C++ extension binary-compatible across future releases.
#     No upper bound is pinned — we want to follow PyTorch forward, not freeze.

name: sparselab

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - pip:
      - torch>=2.8
      - numpy>=1.24
      - pybind11>=2.11
      - pytest>=7.0
