# Build SparseCore wheels for macOS + Linux across Python 3.11/3.12/3.13.
#
# Triggered on:
#   - Any push to main         → build only, do not publish
#   - Any pull request         → build only
#   - Tag push matching v*     → build + publish to PyPI
#
# The actual PyPI upload is a separate job that gates on the tag
# trigger and uses a trusted-publisher configuration on PyPI (no
# long-lived API tokens in the repo).
#
# cibuildwheel handles:
#   - Setting up the right Python versions
#   - Running auditwheel repair (Linux) / delocate-wheel (macOS) to
#     bundle libomp inside the wheel so end users don't need brew install
#   - Running our smoke test inside each wheel's environment
#
# NOTE: The matrix below is deliberately narrow for v0.1:
#   macOS arm64, macOS x86_64, Linux x86_64, Linux aarch64 × 3.11/3.12/3.13
# = 12 wheels. Windows wheels are v0.2.

name: Build wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build_wheels:
    name: ${{ matrix.label }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Keep going if one platform fails so we see all failures at once.
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — native, has NEON path.
          - os: macos-14
            label: macOS-arm64
            arch: arm64
            python: "3.11"
          - os: macos-14
            label: macOS-arm64
            arch: arm64
            python: "3.12"
          - os: macos-14
            label: macOS-arm64
            arch: arm64
            python: "3.13"
          # macOS Intel — last-call support. GitHub's macos-13 still
          # runs on x86_64 hardware. If/when they retire it we cross-
          # compile from arm64 runners.
          - os: macos-13
            label: macOS-x86_64
            arch: x86_64
            python: "3.11"
          - os: macos-13
            label: macOS-x86_64
            arch: x86_64
            python: "3.12"
          - os: macos-13
            label: macOS-x86_64
            arch: x86_64
            python: "3.13"
          # Linux x86_64 — manylinux_2_28 via cibuildwheel default image.
          - os: ubuntu-24.04
            label: Linux-x86_64
            arch: x86_64
            python: "3.11"
          - os: ubuntu-24.04
            label: Linux-x86_64
            arch: x86_64
            python: "3.12"
          - os: ubuntu-24.04
            label: Linux-x86_64
            arch: x86_64
            python: "3.13"
          # Linux aarch64 — native Graviton-class runner (added 2025).
          # Has the NEON path.
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            arch: aarch64
            python: "3.11"
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            arch: aarch64
            python: "3.12"
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            arch: aarch64
            python: "3.13"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v2.21
        env:
          # Restrict cibuildwheel to the single target we want for this
          # matrix row. Otherwise it'd try to build all Python versions.
          CIBW_BUILD: "cp${{ matrix.python == '3.11' && '311' || matrix.python == '3.12' && '312' || '313' }}-*"
          CIBW_ARCHS: ${{ matrix.arch }}

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}-py${{ matrix.python }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────
  # Publish step — only runs on tag pushes matching v*.
  # Uses PyPI's trusted publisher flow (no tokens in the repo).
  # Requires a one-time setup on pypi.org under the project's
  # "Publishing" tab: trust this GitHub repo + workflow.
  # ─────────────────────────────────────────────────────────────
  upload_to_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/sparsecore
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Leave password/username unset — trusted publishing handles
          # auth via OIDC token exchange with PyPI.
          packages-dir: dist/
