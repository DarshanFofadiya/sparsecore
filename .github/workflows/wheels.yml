# Build SparseCore wheels for macOS + Linux across Python 3.11/3.12/3.13.
#
# Triggered on:
#   - Any push to main         → build only, do not publish
#   - Any pull request         → build only
#   - Tag push matching v*     → build + publish to PyPI
#
# The actual PyPI upload is a separate job that gates on the tag
# trigger and uses a trusted-publisher configuration on PyPI (no
# long-lived API tokens in the repo).
#
# cibuildwheel handles:
#   - Setting up the right Python versions
#   - Running auditwheel repair (Linux) / our custom repair script
#     (macOS, see scripts/repair_wheel_macos.sh) to handle libomp
#   - Running our smoke test inside each wheel's environment
#
# Matrix: macOS arm64, Linux x86_64, Linux aarch64 × Python 3.11/3.12/3.13
#   = 9 wheels.
#
# NOT shipped — Intel Mac (macOS x86_64):
#   We tried in v0.1.1 with the macos-15-intel runner. The wheel builds
#   cleanly, but the smoke test fails because sparsecore depends on
#   torch>=2.8 and upstream PyTorch stopped publishing macOS x86_64
#   wheels after torch 2.2.2 (January 2024 deprecation; see
#   https://dev-discuss.pytorch.org/t/pytorch-macos-x86-builds-deprecation-starting-january-2024/1690).
#   Without a torch wheel on PyPI for that platform, any sparsecore
#   wheel we ship would be unusable — users couldn't install the
#   dependency. Intel Mac users can still build sparsecore from sdist
#   with torch pinned at <=2.2.2, but we'd be shipping against an
#   end-of-life torch. Not a trade we want to make for v0.1.
#
# NOT yet shipped — Windows: planned for v0.2.

name: Build wheels

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build_wheels:
    name: ${{ matrix.label }} / py${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      # Keep going if one platform fails so we see all failures at once.
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon — native, has NEON path.
          - os: macos-14
            label: macOS-arm64
            arch: arm64
            python: "3.11"
          - os: macos-14
            label: macOS-arm64
            arch: arm64
            python: "3.12"
          - os: macos-14
            label: macOS-arm64
            arch: arm64
            python: "3.13"
          # Intel Mac (macOS x86_64) wheels are NOT built.
          # Upstream PyTorch stopped publishing macOS x86_64 wheels
          # after torch 2.2.2 (Jan 2024). Since sparsecore depends on
          # torch>=2.8, an Intel Mac wheel would have no installable
          # dependency. See the workflow header for the full story.
          # Linux x86_64 — manylinux_2_28 via cibuildwheel default image.
          - os: ubuntu-24.04
            label: Linux-x86_64
            arch: x86_64
            python: "3.11"
          - os: ubuntu-24.04
            label: Linux-x86_64
            arch: x86_64
            python: "3.12"
          - os: ubuntu-24.04
            label: Linux-x86_64
            arch: x86_64
            python: "3.13"
          # Linux aarch64 — native Graviton-class runner (added 2025).
          # Has the NEON path.
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            arch: aarch64
            python: "3.11"
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            arch: aarch64
            python: "3.12"
          - os: ubuntu-24.04-arm
            label: Linux-aarch64
            arch: aarch64
            python: "3.13"

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build wheel
        uses: pypa/cibuildwheel@v2.22
        env:
          # Restrict cibuildwheel to the single target we want for this
          # matrix row. Otherwise it'd try to build all Python versions.
          CIBW_BUILD: "cp${{ matrix.python == '3.11' && '311' || matrix.python == '3.12' && '312' || '313' }}-*"
          CIBW_ARCHS: ${{ matrix.arch }}

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.label }}-py${{ matrix.python }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist
      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  # ─────────────────────────────────────────────────────────────
  # Publish step — only runs on tag pushes matching v*.
  # Uses PyPI's trusted publisher flow (no tokens in the repo).
  # Requires a one-time setup on pypi.org under the project's
  # "Publishing" tab: trust this GitHub repo + workflow.
  # ─────────────────────────────────────────────────────────────
  upload_to_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/sparsecore
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Leave password/username unset — trusted publishing handles
          # auth via OIDC token exchange with PyPI.
          packages-dir: dist/
